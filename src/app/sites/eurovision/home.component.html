<main>
  @if (!isLoading$()) {
    @for (contest of contests$(); track contest.year) {
      @if (contest.entries.length > 0) {
        <eurovision-contest-overview [contest]="contest"></eurovision-contest-overview>
      }
    }
    <eurovision-contest-overview [contest]="null"></eurovision-contest-overview>
  } @else {
    <every-loading/>
  }
</main>

<every-language-switch></every-language-switch>
