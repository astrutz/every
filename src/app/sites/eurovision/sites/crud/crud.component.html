@if (!isLoading$()) {
  <section>
    <every-content-area>
      <h1 class="text-3xl mt-4 mb-4">CRUD</h1>

      <div class="sm:hidden mb-4">
        <label for="tabs" class="sr-only">CRUD</label>
        <select
          id="tabs"
          (change)="setTab($event)"
          class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
          @for (key of keys; track key.name + 1) {
            <option [value]="key.key">{{ key.name }}</option>
          }
        </select>
      </div>
      <ul
        class="hidden mb-6 text-sm font-medium text-center text-gray-500 rounded-lg shadow-sm sm:flex dark:divide-gray-700 dark:text-gray-400">
        @for (key of keys; track key.name) {
          <li class="w-full focus-within:z-10">
            <button
              (click)="tab$.set(key.key)"
              [id]="key.key"
              class="inline-block w-full p-4 border-gray-200 hover:text-gray-700 dark:border-gray-700 rounded-s-lg active focus:outline-none"
              [ngClass]="{
                'bg-white hover:bg-gray-50 dark:hover:text-white dark:bg-gray-800 dark:hover:bg-gray-700':
                  key.key !== tab$(),
                'text-gray-900 dark:bg-gray-700 bg-gray-100 dark:text-white': key.key === tab$(),
                'rounded-s-lg': $first,
                'rounded-e-lg': $last,
                'border-r': !$last,
              }">
              {{ key.name }}
            </button>
          </li>
        }
      </ul>
      @switch (tab$()) {
        @case ('entries') {
          <eurovision-entry-form></eurovision-entry-form>
        }
        @case ('contests') {
          <eurovision-contest-form></eurovision-contest-form>
        }
      }
    </every-content-area>
  </section>
} @else {
  <every-loading></every-loading>
}
